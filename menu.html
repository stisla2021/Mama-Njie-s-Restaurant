<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Menu - Mama Njie's Restaurant</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
    body {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); /* FIXED: Blue gradient background like screenshot */
        color: white; /* FIXED: White text on blue bg */
        min-height: 100vh;
    }
    
    .menu-item.clickable {
        cursor: pointer;
        transition: transform 0.2s;
        background: rgba(5, 1, 29, 0.95); /* FIXED: White card on blue bg */
        color: #333; /* FIXED: Dark text on card */
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3); /* FIXED: Stronger shadow */
    }
    .menu-item.clickable:hover {
        transform: scale(1.03);
        box-shadow: 0 4px 15px rgba(255,165,0,0.3);
    }
    .order-btn {
        display: inline-block;
        margin-top: 10px;
        background: #ffb347; /* FIXED: Yellow-orange button like screenshot */
        color: #1e3c72; /* FIXED: Dark blue text on button */
        font-weight: bold;
        padding: 10px;
        width: 100%;
        border-radius: 6px;
        text-align: center;
        transition: background 0.3s;
    }
    .order-btn:hover {
        background: #ff6b35; /* FIXED: Darker orange on hover */
        color: white;
    }
    .item-header {
        font-size: 18px;
        font-weight: bold;
        color: #1e3c72; /* FIXED: Dark blue dish name */
        margin: 8px 0;
    }
    .price {
        float: right;
        color: #ff6b35; /* FIXED: Orange price like screenshot */
        font-weight: bold;
    }
    .menu-item p {
        color: #555; /* FIXED: Dark gray description */
        font-size: 14px;
    }
    h2 strong {
        color: #ffb347; /* FIXED: Orange "Our Menu" heading */
    }
    .menu-subtitle {
        color: #e0e0e0; /* FIXED: Light gray subtitle on blue bg */
        text-align: center;
        margin-bottom: 30px;
    }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Mama Njie's</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="reservation.html">Reserve</a></li>
            </ul>
        </div>
    </nav>

    <section id="menu" class="menu">
        <div class="container">
            <h2><strong>Our Menu</strong></h2>
            <p class="menu-subtitle"><i>Traditional Gambian Dishes - Click any dish to reserve</i></p>

            <div class="menu-grid" id="menu-grid">
                <p class="loading-text">Loading menu...</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 St_ISLA2021</p>
    </footer>

    <button id="backToTopBtn" class="back-to-top-btn" title="Back to top">
        <strong>↑</strong>
    </button>

    <script>
    fetch('/api/menu')
.then(res => res.json())
.then(dishes => {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';

        if (dishes.length === 0) {
        grid.innerHTML = '<p class="no-dishes-text">No dishes found. Add some in MongoDB Compass!</p>';
        return;
        }

        const categories = {};
        dishes.forEach(dish => {
        if (!categories[dish.category]) {
            categories[dish.category] = [];
        }
        categories[dish.category].push(dish);
        });

        for (let cat in categories) {
            let columnHTML = `<div class="menu-column"><h3><strong>${cat}</strong></h3>`;

        categories[cat].forEach(dish => {
            columnHTML += `
            <div class="menu-item clickable" onclick="goToReservation('${dish.name.replace(/'/g, "\\'")}')">
                <img src="images/${dish.image}" alt="${dish.name}" class="menu-image" onerror="handleImageError(this)">
                <div class="item-header">${dish.name}<span class="price">${dish.price} GMD</span></div>
                <p>${dish.description}</p>
                <span class="order-btn">Reserve This Dish →</span>
            </div>
            `;
        });

        columnHTML += `</div>`;
        grid.innerHTML += columnHTML;
        }
    })
.catch(err => {
        document.getElementById('menu-grid').innerHTML = '<p class="error-text">Error loading menu. Make sure server is running: node server.js</p>';
        console.error(err);
    });

    function goToReservation(dishName) {
        window.location.href = 'reservation.html?dish=' + encodeURIComponent(dishName);
    }

    function handleImageError(img) {
        img.classList.add('image-error');
        img.alt = img.alt.replace(' - Image unavailable', '') + ' - Image unavailable';
    }

    const backBtn = document.getElementById('backToTopBtn');
    window.onscroll = function() {
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            backBtn.style.display = "block";
        } else {
            backBtn.style.display = "none";
        }
    };
    backBtn.onclick = function() {
        window.scrollTo({top: 0, behavior: 'smooth'});
    };
    </script>
    <script src="js/script.js"></script>
</body>
</html>
