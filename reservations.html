<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reservations - Mama Njie's Restaurant</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Mama Njie's</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="reservations.html" class="active">Reserve</a></li>
            </ul>
        </div>
    </nav>

    <!-- Reservation Section -->
    <section id="reservations" class="reservations">
        <div class="container">
            <h2><strong>Make a Reservation</strong></h2>
            <p class="reservation-subtitle"><i>Book your table at Mama Njie's</i></p>
            <form class="reservation-form" onsubmit="handleReservation(event)">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone" required>
                <select title="Reservation Time" required>
                    <option value="">Time</option>
                    <option value="7:00am">7:00 AM</option>
                    <option value="7:30am">7:30 AM</option>
                    <option value="8:00am">8:00 AM</option>
                    <option value="8:30am">8:30 AM</option>
                    <option value="9:00am">9:00 AM</option>
                    <option value="9:30am">9:30 AM</option>
                    <option value="10:00am">10:00 AM</option>
                    <option value="10:30am">10:30 AM</option>
                    <option value="11:00am">11:00 AM</option>
                    <option value="11:30am">11:30 AM</option>
                    <option value="12:00pm">12:00 PM</option>
                    <option value="12:30pm">12:30 PM</option>
                    <option value="1:00pm">1:00 PM</option>
                    <option value="1:30pm">1:30 PM</option>
                    <option value="2:00pm">2:00 PM</option>
                    <option value="2:30pm">2:30 PM</option>
                    <option value="3:00pm">3:00 PM</option>
                    <option value="3:30pm">3:30 PM</option>
                    <option value="4:00pm">4:00 PM</option>
                    <option value="4:30pm">4:30 PM</option>
                    <option value="5:00pm">5:00 PM</option>
                    <option value="5:30pm">5:30 PM</option>
                    <option value="6:00pm">6:00 PM</option>
                    <option value="6:30pm">6:30 PM</option>
                    <option value="7:00pm">7:00 PM</option>
                    <option value="7:30pm">7:30 PM</option>
                    <option value="8:00pm">8:00 PM</option>
                    <option value="8:30pm">8:30 PM</option>
                    <option value="9:00pm">9:00 PM</option>
                    <option value="9:30pm">9:30 PM</option>
                    <option value="10:00pm">10:00 PM</option>
                    <option value="10:30pm">10:30 PM</option>
                    <option value="11:00pm">11:00 PM</option>
                </select>
                <button type="submit" class="btn">Reserve</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 St_ISLA2021</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
